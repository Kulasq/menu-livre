<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedidos — Pão de Mão</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

  <div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">🍔</div>
        <div>
          <h2>Pão de Mão</h2>
          <small>Painel Admin</small>
        </div>
      </div>
      <nav class="sidebar-nav" aria-label="Navegação do painel">
        <a href="dashboard.html" class="sidebar-link">
          <span class="sidebar-link-icon">📊</span> Dashboard
        </a>
        <a href="cardapio.html" class="sidebar-link">
          <span class="sidebar-link-icon">🍽️</span> Cardápio
        </a>
        <a href="pedidos.html" class="sidebar-link ativo">
          <span class="sidebar-link-icon">📋</span> Pedidos
        </a>
      </nav>
      <div class="sidebar-logout">
        <button class="sidebar-link" id="btn-logout" type="button">
          <span class="sidebar-link-icon">🚪</span> Sair
        </button>
      </div>
    </aside>

    <!-- HEADER -->
    <header class="admin-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn-menu-mobile" id="btn-menu" type="button" aria-label="Abrir menu">☰</button>
        <h1 class="admin-header-titulo">Pedidos</h1>
      </div>
      <div class="admin-header-usuario">
        <span class="admin-header-nome" id="header-usuario-nome"></span>
        <div class="admin-header-avatar" id="header-usuario-avatar"></div>
      </div>
    </header>

    <!-- CONTEÚDO -->
    <main class="admin-conteudo">

      <!-- Filtros -->
      <div class="pedidos-filtros">
        <select id="filtro-status" class="form-input" style="width:auto;padding:9px 14px;font-size:.88rem">
          <option value="">Todos os status</option>
          <option value="pendente">🕐 Pendente</option>
          <option value="confirmado">✅ Confirmado</option>
          <option value="em_preparo">🔥 Preparando</option>
          <option value="pronto">📦 Pronto</option>
          <option value="entregue">🎉 Entregue</option>
          <option value="cancelado">❌ Cancelado</option>
        </select>

        <select id="filtro-tipo" class="form-input" style="width:auto;padding:9px 14px;font-size:.88rem">
          <option value="">Todos os tipos</option>
          <option value="delivery">🛵 Delivery</option>
          <option value="retirada">🏪 Retirada</option>
        </select>

        <button class="btn btn-secondary btn-sm" id="btn-atualizar">🔄 Atualizar</button>

        <span class="pedidos-auto-refresh">Atualiza a cada 30s</span>
      </div>

      <!-- Loading -->
      <div id="pedidos-loading" class="loading-spinner">
        <div class="spinner-admin"></div>
      </div>

      <!-- Vazio -->
      <div id="pedidos-vazio" class="estado-vazio hidden">
        <div class="estado-vazio-icon">📋</div>
        <p>Nenhum pedido encontrado.</p>
      </div>

      <!-- Lista de pedidos -->
      <div id="pedidos-lista" class="pedidos-grid"></div>

    </main>
  </div>

  <!-- Overlay sidebar mobile -->
  <div class="sidebar-overlay hidden" id="sidebar-overlay"></div>


  <!-- ═══════════════════════════════════════════════════════
       MODAL DETALHE DO PEDIDO
       ═══════════════════════════════════════════════════════ -->

  <div id="modal-pedido" class="modal-admin hidden">
    <div class="modal-admin-overlay" id="modal-pedido-overlay"></div>
    <div class="modal-admin-box modal-admin-lg">
      <div class="modal-admin-header">
        <h3>Pedido <span id="detalhe-numero"></span></h3>
        <button class="modal-admin-fechar" id="modal-pedido-fechar" aria-label="Fechar">✕</button>
      </div>
      <div class="modal-admin-body">

        <!-- Info geral -->
        <div class="detalhe-info-grid">
          <div class="detalhe-info-item">
            <span class="detalhe-info-label">Status</span>
            <span id="detalhe-status"></span>
          </div>
          <div class="detalhe-info-item">
            <span class="detalhe-info-label">Cliente</span>
            <span id="detalhe-cliente"></span>
          </div>
          <div class="detalhe-info-item">
            <span class="detalhe-info-label">Tipo</span>
            <span id="detalhe-tipo"></span>
          </div>
          <div class="detalhe-info-item">
            <span class="detalhe-info-label">Horário</span>
            <span id="detalhe-horario"></span>
          </div>
          <div class="detalhe-info-item">
            <span class="detalhe-info-label">Pagamento</span>
            <span id="detalhe-pagamento"></span>
          </div>
          <div class="detalhe-info-item">
            <span class="detalhe-info-label">Endereço</span>
            <span id="detalhe-endereco"></span>
          </div>
          <div class="detalhe-info-item">
            <span class="detalhe-info-label">📅 Agendado para</span>
            <span id="detalhe-agendado"></span>
          </div>
          <div class="detalhe-info-item">
            <span class="detalhe-info-label">Observação</span>
            <span id="detalhe-obs"></span>
          </div>
        </div>

        <!-- Itens -->
        <div class="detalhe-secao">
          <h4>Itens do pedido</h4>
          <div id="detalhe-itens" class="detalhe-itens-lista"></div>
        </div>

        <!-- Totais -->
        <div class="detalhe-totais">
          <div class="detalhe-total-row">
            <span>Subtotal</span>
            <span id="detalhe-subtotal"></span>
          </div>
          <div class="detalhe-total-row hidden" id="detalhe-taxa-row">
            <span>Taxa de entrega</span>
            <span id="detalhe-taxa"></span>
          </div>
          <div class="detalhe-total-row detalhe-total-final">
            <strong>Total</strong>
            <strong id="detalhe-total"></strong>
          </div>
        </div>

      </div>
    </div>
  </div>


  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pedidos.js"></script>
</body>
</html>
